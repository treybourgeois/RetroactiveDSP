<!DOCTYPE html>
<link rel="icon" href="./img/R_logo_nobackground.png"></link>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Retroactive DSP Firmware Updater</title>
    <link rel="stylesheet" href="css/chatstyle.css">
</head>
<body>

<div class="page">

    <header class="site-header">
        <div class="brand">
            <img src="img/R_logo_nobackground.png" alt="My Logo" class="logo">
            <div class="brand-kicker">Firmware Utility</div>
            <h1 class="brand-title">Retroactive.DSP</h1>
        </div>
    </header>

    <section class="section">
        <h2 class="section-title">Connect Device</h2>
        <button id="connectBtn" class="button-primary">
            Connect Daisy
        </button>
    </section>

    <section class="section">
        <h2 class="section-title">Select Firmware</h2>
        <label for="firmwareSelect">Firmware Version</label>
        <select id="firmwareSelect">
            <option>Loading firmware...</option>
        </select>
    </section>

    <section class="section">
        <h2 class="section-title">Flash Firmware</h2>
        <button id="flashBtn" class="button-accent" disabled>
            Flash Firmware
        </button>
    </section>

    <section class="section">
        <h2 class="section-title">Status</h2>
        <div id="statusLog" class="log-box">
            Ready.
        </div>
    </section>

</div>

<script src="dfu/dfu.js"></script>
<script src="dfu/dfuse.js"></script>
<script src="dfu/FileSaver.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
